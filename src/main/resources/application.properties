spring.application.name=quickconnect_backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/quickconnect
spring.datasource.username=root
spring.datasource.password=Mysqlroot@25

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server
server.port=5050

# ✅ NEW: Anthropic API key for the AI service-finder assistant.
# Get your key from https://console.anthropic.com/settings/keys
# ⚠️ NEVER commit a real key to GitHub — use an environment variable instead:
#     anthropic.api.key=${ANTHROPIC_API_KEY}
# and set ANTHROPIC_API_KEY as an actual environment variable on your machine
# or in your deployment platform's environment settings.
anthropic.api.key=${ANTHROPIC_API_KEY}

logging.level.org.springframework.security=DEBUG
